<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales AI Agent — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #f6f7f9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #1a2233;
    -webkit-font-smoothing: antialiased;
  }
  .login-card {
    width: 100%;
    max-width: 400px;
    background: #ffffff;
    border: 1px solid #e4e7ec;
    border-radius: 12px;
    padding: 2.5rem 2rem;
    box-shadow: 0 1px 2px rgba(16,24,40,.05), 0 12px 32px rgba(16,24,40,.08);
    color: #1a2233;
  }
  .brand {
    font-size: 1.35rem;
    font-weight: 600;
    color: #1a2233;
    letter-spacing: -0.01em;
  }
  .brand i { margin-right: 8px; color: #1d4ed8; }
  .subtitle {
    font-size: .85rem;
    color: #667085;
    margin-bottom: 2rem;
    margin-top: 4px;
  }
  .form-label {
    color: #344054;
    font-size: .85rem;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .form-control {
    background: #fff;
    border: 1px solid #d6dae1;
    color: #1a2233;
    border-radius: 8px;
    padding: .65rem 1rem;
    transition: border-color .15s, box-shadow .15s;
  }
  .form-control:focus {
    background: #fff;
    border-color: #1d4ed8;
    color: #1a2233;
    box-shadow: 0 0 0 3px rgba(29,78,216,0.15);
  }
  .form-control::placeholder { color: #98a2b3; }
  .input-group-text {
    background: #f9fafb;
    border: 1px solid #d6dae1;
    border-right: none;
    color: #667085;
    border-radius: 8px 0 0 8px;
  }
  .input-group .form-control { border-left: none; border-radius: 0 8px 8px 0; }
  .btn-login {
    background: #1d4ed8;
    border: 1px solid #1d4ed8;
    border-radius: 8px;
    color: #fff;
    font-weight: 500;
    font-size: .9rem;
    padding: .65rem;
    width: 100%;
    transition: background-color .15s;
    margin-top: .5rem;
  }
  .btn-login:hover {
    background: #1a44be;
    border-color: #1a44be;
    color: #fff;
  }
  .btn-login:active { background: #163a9f; }
  .alert-error {
    background: #fdecea;
    border: 1px solid #f2d0cc;
    color: #b42318;
    border-radius: 8px;
    padding: .7rem 1rem;
    font-size: .85rem;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .divider {
    border-color: #eef0f3;
    margin: 1.75rem 0;
  }
  .hint {
    font-size: .78rem;
    color: #98a2b3;
    text-align: center;
  }
  .hint strong { color: #475467; }
  .eye-toggle {
    background: #fff;
    border: 1px solid #d6dae1;
    border-left: none;
    color: #667085;
    border-radius: 0 8px 8px 0;
    cursor: pointer;
    padding: 0 .75rem;
    transition: color .15s;
  }
  .eye-toggle:hover { color: #1d4ed8; }
</style>
</head>
<body>

<div class="login-card">
  <!-- Logo -->
  <div class="brand"><i class="bi bi-robot"></i>Sales AI Agent</div>
  <div class="subtitle">Plataforma de prospecção inteligente B2B</div>

  <!-- Erro -->
  <div id="error-msg" class="alert-error" style="display:none">
    <i class="bi bi-exclamation-circle-fill"></i>
    <span id="error-text"></span>
  </div>

  <!-- Formulário -->
  <form method="POST" action="/login" id="login-form">
    <div class="mb-3">
      <label class="form-label">Usuário</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
        <input
          type="text"
          class="form-control"
          name="username"
          id="username"
          placeholder="Digite seu usuário"
          autocomplete="username"
          autofocus
          required
        >
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Senha</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        <input
          type="password"
          class="form-control"
          name="password"
          id="password"
          placeholder="Digite sua senha"
          autocomplete="current-password"
          required
        >
        <button type="button" class="eye-toggle" onclick="toggleSenha()" title="Mostrar/ocultar senha">
          <i class="bi bi-eye-fill" id="eye-icon"></i>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="btn-submit">
      <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
    </button>
  </form>

  <hr class="divider">
  <div class="hint">Primeiro acesso? <strong>admin</strong> / <strong>admin123</strong></div>
</div>

<script>
  // Mostrar erro via query string
  const params = new URLSearchParams(window.location.search);
  const erro = params.get('error');
  if (erro) {
    document.getElementById('error-msg').style.display = 'flex';
    document.getElementById('error-text').textContent = decodeURIComponent(erro);
  }

  // Toggle mostrar senha
  function toggleSenha() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'bi bi-eye-slash-fill';
    } else {
      input.type = 'password';
      icon.className = 'bi bi-eye-fill';
    }
  }

  // Loading state ao submeter
  document.getElementById('login-form').addEventListener('submit', function () {
    const btn = document.getElementById('btn-submit');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';
    btn.disabled = true;
  });
</script>

</body>
</html>
