<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales AI Agent — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
  }
  .login-card {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    color: #fff;
  }
  .brand {
    font-size: 1.6rem;
    font-weight: 700;
    color: #a78bfa;
    letter-spacing: -0.5px;
  }
  .brand i { margin-right: 8px; }
  .subtitle {
    font-size: .85rem;
    color: rgba(255,255,255,0.5);
    margin-bottom: 2rem;
    margin-top: 4px;
  }
  .form-label {
    color: rgba(255,255,255,0.75);
    font-size: .85rem;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .form-control {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 10px;
    padding: .65rem 1rem;
    transition: all .2s;
  }
  .form-control:focus {
    background: rgba(255,255,255,0.12);
    border-color: #a78bfa;
    color: #fff;
    box-shadow: 0 0 0 3px rgba(167,139,250,0.2);
  }
  .form-control::placeholder { color: rgba(255,255,255,0.3); }
  .input-group-text {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-right: none;
    color: rgba(255,255,255,0.5);
    border-radius: 10px 0 0 10px;
  }
  .input-group .form-control { border-left: none; border-radius: 0 10px 10px 0; }
  .btn-login {
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-weight: 600;
    font-size: .95rem;
    padding: .7rem;
    width: 100%;
    transition: all .2s;
    margin-top: .5rem;
  }
  .btn-login:hover {
    background: linear-gradient(135deg, #6d28d9, #8b5cf6);
    transform: translateY(-1px);
    box-shadow: 0 8px 25px rgba(124,58,237,0.4);
    color: #fff;
  }
  .btn-login:active { transform: translateY(0); }
  .alert-error {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.4);
    color: #fca5a5;
    border-radius: 10px;
    padding: .7rem 1rem;
    font-size: .85rem;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .divider {
    border-color: rgba(255,255,255,0.1);
    margin: 1.75rem 0;
  }
  .hint {
    font-size: .78rem;
    color: rgba(255,255,255,0.3);
    text-align: center;
  }
  .hint strong { color: rgba(255,255,255,0.5); }
  .eye-toggle {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-left: none;
    color: rgba(255,255,255,0.5);
    border-radius: 0 10px 10px 0;
    cursor: pointer;
    padding: 0 .75rem;
    transition: color .2s;
  }
  .eye-toggle:hover { color: #a78bfa; }
</style>
</head>
<body>

<div class="login-card">
  <!-- Logo -->
  <div class="brand"><i class="bi bi-robot"></i>Sales AI Agent</div>
  <div class="subtitle">Plataforma de prospecção inteligente B2B</div>

  <!-- Erro -->
  <div id="error-msg" class="alert-error" style="display:none">
    <i class="bi bi-exclamation-circle-fill"></i>
    <span id="error-text"></span>
  </div>

  <!-- Formulário -->
  <form method="POST" action="/login" id="login-form">
    <div class="mb-3">
      <label class="form-label">Usuário</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
        <input
          type="text"
          class="form-control"
          name="username"
          id="username"
          placeholder="Digite seu usuário"
          autocomplete="username"
          autofocus
          required
        >
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Senha</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        <input
          type="password"
          class="form-control"
          name="password"
          id="password"
          placeholder="Digite sua senha"
          autocomplete="current-password"
          required
        >
        <button type="button" class="eye-toggle" onclick="toggleSenha()" title="Mostrar/ocultar senha">
          <i class="bi bi-eye-fill" id="eye-icon"></i>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="btn-submit">
      <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
    </button>
  </form>

  <hr class="divider">
  <div class="hint">Primeiro acesso? <strong>admin</strong> / <strong>admin123</strong></div>
</div>

<script>
  // Mostrar erro via query string
  const params = new URLSearchParams(window.location.search);
  const erro = params.get('error');
  if (erro) {
    document.getElementById('error-msg').style.display = 'flex';
    document.getElementById('error-text').textContent = decodeURIComponent(erro);
  }

  // Toggle mostrar senha
  function toggleSenha() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'bi bi-eye-slash-fill';
    } else {
      input.type = 'password';
      icon.className = 'bi bi-eye-fill';
    }
  }

  // Loading state ao submeter
  document.getElementById('login-form').addEventListener('submit', function () {
    const btn = document.getElementById('btn-submit');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';
    btn.disabled = true;
  });
</script>

</body>
</html>
